document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-spacing: 0.01em;\n    color: var(--name);\n    transition: color var(--ease);\n  }\n  .detail-name:hover { color: #fff; }\n  .detail-name .ext { color: #4a4a4a; }\n  .detail-name:hover .ext { color: #888; }\n  .detail-status {\n    margin-left: auto;\n    font-size: 9px;\n    font-weight: 300;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    color: var(--meta);\n  }\n\n  .columns {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 48px;\n    max-width: 940px;\n  }\n  @media (max-width: 720px) {\n    .columns { grid-template-columns: 1fr; gap: 36px; }\n  }\n\n  .section-title {\n    font-size: 9px;\n    font-weight: 300;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--meta);\n    padding-bottom: 10px;\n    margin-bottom: 18px;\n    border-bottom: 1px solid var(--line-soft);\n    display: flex;\n    align-items: baseline;\n    justify-content: space-between;\n  }\n  .section-title .sub { color: var(--faint); letter-spacing: 0.04em; }\n\n  .dfield { margin-bottom: 18px; }\n  .dfield .dk {\n    font-size: 8px;\n    font-weight: 300;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--label);\n    margin-bottom: 6px;\n  }\n  .dfield .dv {\n    font-size: 12.5px;\n    font-weight: 400;\n    color: var(--val);\n    line-height: 1.6;\n    word-break: break-word;\n  }\n  .dfield .dv.dim { color: var(--meta); font-weight: 300; }\n\n  .sub-block {\n    margin-top: 26px;\n    padding: 16px 18px;\n    background: #0d0d0d;\n    border: 1px solid var(--line-soft);\n    border-radius: 4px;\n  }\n  .sub-block .sub-name {\n    font-size: 10px;\n    font-weight: 600;\n    letter-spacing: 0.04em;\n    color: #999;\n    margin-bottom: 14px;\n    display: flex;\n    align-items: baseline;\n    gap: 8px;\n  }\n  .sub-block .sub-name .tag {\n    font-size: 7.5px;\n    font-weight: 300;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--faint);\n  }\n\n  .issue {\n    display: block;\n    padding: 12px 14px;\n    margin-bottom: 8px;\n    background: #0a0a0a;\n    border: 1px solid var(--line-soft);\n    border-radius: 3px;\n    transition: background var(--ease), border-color var(--ease);\n  }\n  .issue:hover { background: var(--card-hover); border-color: var(--line-hover); }\n  .issue .it {\n    font-size: 11.5px;\n    font-weight: 400;\n    color: #c0c0c0;\n    line-height: 1.5;\n    margin-bottom: 5px;\n  }\n  .issue .im {\n    display: flex;\n    gap: 10px;\n    align-items: center;\n    font-size: 8.5px;\n    font-weight: 300;\n    color: var(--meta);\n  }\n  .issue .im .num { color: #585858; }\n\n  .commit {\n    margin-top: 18px;\n    padding-top: 16px;\n    border-top: 1px solid var(--line-soft);\n  }\n  .commit .ck {\n    font-size: 8px;\n    font-weight: 300;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--label);\n    margin-bottom: 7px;\n  }\n  .commit .cmsg {\n    font-size: 11.5px;\n    font-weight: 400;\n    color: var(--val);\n    line-height: 1.5;\n    margin-bottom: 5px;\n    word-break: break-word;\n  }\n  .commit .cmeta { font-size: 8.5px; font-weight: 300; color: var(--meta); }\n\n  .empty {\n    font-size: 11px;\n    font-weight: 300;\n    color: var(--faint);\n    padding: 4px 0;\n  }\n\n  /* ---- Footer ---- */\n  .foot {\n    max-width: 940px;\n    margin: 38px auto 0;\n    padding-top: 14px;\n    border-top: 1px solid var(--line-soft);\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n  }\n  .foot span { font-size: 9px; font-weight: 300; color: #262626; letter-spacing: 0.05em; }\n  .foot button {\n    background: none; border: none;\n    font-size: 9px; font-weight: 300;\n    color: #2c2c2c; letter-spacing: 0.05em;\n    transition: color var(--ease);\n  }\n  .foot button:hover { color: #5a5a5a; }\n\n  .back-btn {\n    background: none;\n    border: 1px solid var(--line);\n    color: var(--meta);\n    font-size: 9px;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    padding: 7px 13px;\n    border-radius: 3px;\n    transition: color var(--ease), border-color var(--ease);\n  }\n  .back-btn:hover { color: #888; border-color: var(--line-hover); }\n\n  .hidden { display: none !important; }\n<\u002Fstyle>\n<\u002Fhead>\n<body style=\"font-size: 20px\">\n\n  \n\n  <!-- ============ OVERVIEW ============ -->\n  <div id=\"overview\">\n\n    <div class=\"meta-bar\">\n      <div class=\"meta-left\">\n        <div class=\"meta-row\">\n          <span class=\"meta-key\">State<\u002Fspan>\n          <span class=\"meta-txt\" id=\"global-state\">—<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"meta-row\">\n          <span class=\"meta-key\">Next<\u002Fspan>\n          <span class=\"meta-txt\" id=\"global-next\">—<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta-right\">\n        <span class=\"status-dot on\" id=\"status\"><span class=\"dot\"><\u002Fspan><span id=\"status-txt\">online<\u002Fspan><\u002Fspan>\n        <button class=\"icon-btn\" id=\"refresh-btn\" title=\"Genindlæs\">↻<\u002Fbutton>\n        <button class=\"icon-btn\" id=\"settings-btn\" title=\"Nøgler\">⚙<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"setup hidden\" id=\"setup\">\n      <h2>Adgang<\u002Fh2>\n      <p>Nøgler gemmes lokalt i din browser (localStorage) — sendes kun til localhost og GitHub.<\u002Fp>\n      <div class=\"field\">\n        <label>Obsidian Local REST API<\u002Flabel>\n        <input type=\"password\" id=\"in-obsidian\" placeholder=\"bearer-nøgle···\" autocomplete=\"off\" spellcheck=\"false\">\n        <div class=\"hint\">Indstillinger → Local REST API → kopiér API-nøgle<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"field\">\n        <label>GitHub PAT <span style=\"color:#333;\">(read-only, repo scope)<\u002Fspan><\u002Flabel>\n        <input type=\"password\" id=\"in-github\" placeholder=\"ghp_···  (valgfri)\" autocomplete=\"off\" spellcheck=\"false\">\n        <div class=\"hint\">Uden token vises projekter stadig — bare uden issues/commits.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"setup-actions\">\n        <button class=\"btn\" id=\"save-keys\">Gem<\u002Fbutton>\n        <button class=\"btn ghost\" id=\"cancel-keys\">Annullér<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid loading\" id=\"grid\"><\u002Fdiv>\n\n    <div class=\"foot\">\n      <span>localhost:27123 · ValdiVault<\u002Fspan>\n      <button id=\"clear-keys\">ryd nøgler<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ DETAIL ============ -->\n  <div id=\"detail\" class=\"hidden\">\n    <div class=\"detail-head\">\n      <button class=\"back-btn\" id=\"back-btn\">← oversigt<\u002Fbutton>\n      <a class=\"detail-name\" id=\"detail-name\" target=\"_blank\" rel=\"noopener\"><\u002Fa>\n      <span class=\"detail-status\" id=\"detail-status\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"columns\" id=\"detail-body\"><\u002Fdiv>\n    <div class=\"foot\">\n      <span id=\"detail-repo\"><\u002Fspan>\n      <button id=\"detail-obsidian\">åbn i obsidian ↗<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<script>\n(function () {\n  'use strict';\n\n  // ---------- config ----------\n  const OBS_BASE   = 'http://localhost:27123';\n  const GH_API     = 'https://api.github.com';\n  const VAULT_NAME = 'ValdiVault';\n  const LS_OBS     = 'almind_obsidian_key';\n  const LS_GH      = 'almind_github_token';\n\n  const GLOBAL_STATE = '99_System/STATE.md';\n  const GLOBAL_NEXT  = '99_System/NEXT.md';\n\n  const PROJECTS = [\n    {\n      id: 'almind-dev', name: 'almind', ext: '-dev',\n      state: '50_Almind/wrap/state.md',\n      log:   '50_Almind/wrap/LOG.md',\n      repo:  'fastermadman/almind-dev', repoPublic: false,\n      subproject: {\n        name: 'fable5',\n        state: '50_Almind/Almind-Fable5/wrap/state.md',\n        log:   '50_Almind/Almind-Fable5/wrap/LOG.md'\n      }\n    },\n    {\n      id: 'almind.org', name: 'almind', ext: '.org',\n      state: null, log: null,\n      repo: 'fastermadman/almind', repoPublic: true\n    },\n    {\n      id: 'lynsyn', name: 'lynsyn', ext: '',\n      state: '60_LYNSYN/wrap/state.md',\n      log:   '60_LYNSYN/wrap/LOG.md',\n      repo:  'fastermadman/LYNSYN', repoPublic: false\n    },\n    {\n      id: 'vibestep', name: 'vibestep', ext: '',\n      state: '80_VibeStep/wrap/state.md',\n      log:   '80_VibeStep/wrap/LOG.md',\n      repo:  'fastermadman/VibeStepLPminiMK3', repoPublic: false\n    },\n    {\n      id: 'beetsgui', name: 'beetsgui', ext: '',\n      state: '30_Resources/DR.WARTEMAL/wrap/state.md',\n      log:   '30_Resources/DR.WARTEMAL/wrap/LOG.md',\n      repo:  'fastermadman/beetsGUI', repoPublic: true\n    },\n    {\n      id: 'vejvis', name: 'vejvis', ext: '',\n      state: '50_Almind/vejvis/wrap/state.md',\n      log:   '50_Almind/vejvis/wrap/LOG.md',\n      repo:  'fastermadman/vejvis', repoPublic: true\n    },\n    {\n      id: 'setup', name: 'setup', ext: '',\n      state: '98_Meta/wrap/state.md',\n      log:   '98_Meta/wrap/LOG.md',\n      repo:  null, repoPublic: false\n    }\n  ];\n\n  // ---------- state ----------\n  let obsKey = localStorage.getItem(LS_OBS) || '';\n  let ghToken = localStorage.getItem(LS_GH) || '';\n  let data = {};        // id -> project data\n  let reachedObs = false;\n\n  // ---------- helpers ----------\n  const $  = (s, r) => (r || document).querySelector(s);\n  const $$ = (s, r) => Array.from((r || document).querySelectorAll(s));\n  const el = (tag, cls, txt) => {\n    const e = document.createElement(tag);\n    if (cls) e.className = cls;\n    if (txt != null) e.textContent = txt;\n    return e;\n  };\n  const esc = (s) => String(s == null ? '' : s);\n\n  function encPath(p) {\n    return p.split('/').map(encodeURIComponent).join('/');\n  }\n\n  function obsidianURI(path) {\n    return 'obsidian://open?vault=' + encodeURIComponent(VAULT_NAME) +\n           '&file=' + encodeURIComponent(path);\n  }\n\n  function fmtDate(raw) {\n    if (!raw) return '—';\n    const d = new Date(raw);\n    if (isNaN(d)) return String(raw).slice(0, 10);\n    return d.toLocaleDateString('da-DK', { day: 'numeric', month: 'short' }) +\n           ' · ' + d.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit' });\n  }\n\n  function relTime(raw) {\n    if (!raw) return '';\n    const d = new Date(raw);\n    if (isNaN(d)) return '';\n    const diff = (Date.now() - d.getTime()) / 1000;\n    if (diff < 3600)  return Math.max(1, Math.round(diff / 60)) + 'm siden';\n    if (diff < 86400) return Math.round(diff / 3600) + 't siden';\n    if (diff < 604800) return Math.round(diff / 86400) + 'd siden';\n    return d.toLocaleDateString('da-DK', { day: 'numeric', month: 'short' });\n  }\n\n  // ---------- parsing ----------\n  function parseFrontmatter(text) {\n    const m = text.match(/^---\\r?\\n([\\s\\S]*?)\\r?\\n---/);\n    if (!m) return {};\n    const out = {};\n    for (const line of m[1].split(/\\r?\\n/)) {\n      const i = line.indexOf(':');\n      if (i < 1) continue;\n      const k = line.slice(0, i).trim();\n      let v = line.slice(i + 1).trim();\n      if ((v.startsWith('\"') && v.endsWith('\"')) || (v.startsWith(\"'\") && v.endsWith(\"'\"))) {\n        v = v.slice(1, -1);\n      }\n      out[k] = v;\n    }\n    return out;\n  }\n\n  function firstWikilink(text) {\n    const m = text.match(/\\[\\[([^\\]|#]+)/);\n    return m ? m[1].trim() : null;\n  }\n\n  function firstHeading(text) {\n    const m = text.match(/^#{1,6}\\s+(.+)$/m);\n    return m ? m[1].trim() : null;\n  }\n\n  // strip frontmatter + heading markers, return first meaningful line\n  function firstLine(text) {\n    let t = text.replace(/^---\\r?\\n[\\s\\S]*?\\r?\\n---\\r?\\n?/, '');\n    for (const raw of t.split(/\\r?\\n/)) {\n      const line = raw.replace(/^#{1,6}\\s+/, '').replace(/^[-*>]\\s+/, '').trim();\n      if (line) return line.replace(/\\[\\[([^\\]|#]+)(\\|[^\\]]+)?\\]\\]/g, '$1');\n    }\n    return '';\n  }\n\n  // ---------- network: obsidian ----------\n  async function getVaultFile(path) {\n    const r = await fetch(OBS_BASE + '/vault/' + encPath(path), {\n      headers: { Authorization: 'Bearer ' + obsKey, Accept: 'text/markdown' },\n      signal: AbortSignal.timeout(8000)\n    });\n    reachedObs = true;\n    if (!r.ok) throw new Error('HTTP ' + r.status);\n    return r.text();\n  }\n\n  async function resolveSession(def) {\n    if (!def.log) return '—';\n    let logText;\n    try { logText = await getVaultFile(def.log); }\n    catch { return '—'; }\n    const link = firstWikilink(logText);\n    if (!link) return '—';\n\n    const base = def.log.slice(0, def.log.lastIndexOf('/'));\n    const candidates = [];\n    if (link.includes('/')) {\n      candidates.push(link.endsWith('.md') ? link : link + '.md');\n    } else {\n      candidates.push(base + '/' + link + '.md');\n      candidates.push(base.replace(/\\/wrap$/, '') + '/' + link + '.md');\n    }\n    for (const c of candidates) {\n      try {\n        const txt = await getVaultFile(c);\n        return firstHeading(txt) || link.split('/').pop();\n      } catch { /* try next */ }\n    }\n    return link.split('/').pop();\n  }\n\n  // ---------- network: github ----------\n  async function ghFetch(path) {\n    const headers = { Accept: 'application/vnd.github+json' };\n    if (ghToken) headers.Authorization = 'token ' + ghToken;\n    const r = await fetch(GH_API + path, { headers, signal: AbortSignal.timeout(6000) });\n    if (!r.ok) throw new Error('GH ' + r.status);\n    return r.json();\n  }\n\n  async function getIssues(repo) {\n    try {\n      const arr = await ghFetch('/repos/' + repo + '/issues?state=open&per_page=3&sort=updated&direction=desc');\n      // filter out PRs (issues endpoint includes them)\n      return arr.filter(i => !i.pull_request).map(i => ({\n        number: i.number, title: i.title, url: i.html_url, updated: i.updated_at\n      }));\n    } catch { return null; }\n  }\n\n  async function getOpenCount(repo) {\n    try {\n      const r = await ghFetch('/search/issues?q=' +\n        encodeURIComponent('repo:' + repo + ' is:issue is:open') + '&per_page=1');\n      return typeof r.total_count === 'number' ? r.total_count : null;\n    } catch { return null; }\n  }\n\n  async function getLatestCommit(repo) {\n    try {\n      const arr = await ghFetch('/repos/' + repo + '/commits?per_page=1');\n      if (!arr.length) return null;\n      const c = arr[0];\n      return {\n        message: (c.commit.message || '').split('\\n')[0],\n        date: c.commit.author ? c.commit.author.date : null,\n        url: c.html_url,\n        author: c.commit.author ? c.commit.author.name : ''\n      };\n    } catch { return null; }\n  }\n\n  // ---------- load a project ----------\n  async function loadProject(def) {\n    const out = {\n      id: def.id, name: def.name, ext: def.ext,\n      repo: def.repo, repoPublic: def.repoPublic,\n      statePath: def.state,\n      focus: '—', next: '—', blockers: '—', date: '—', session: '—',\n      issues: null, issueCount: null, commit: null, sub: null\n    };\n\n    if (def.state) {\n      try {\n        const txt = await getVaultFile(def.state);\n        const fm = parseFrontmatter(txt);\n        out.focus    = fm['proj-fokus']   || '—';\n        out.next     = fm['proj-næste']   || fm['proj-naeste'] || '—';\n        out.blockers = fm['proj-blokker'] || '—';\n        out.date     = fmtDate(fm['proj-dato']);\n        out.dateRaw  = fm['proj-dato'] || '';\n      } catch { /* leave dashes */ }\n      out.session = await resolveSession(def);\n    }\n\n    if (def.subproject) {\n      const s = { name: def.subproject.name, focus: '—', next: '—', blockers: '—', session: '—', statePath: def.subproject.state };\n      try {\n        const txt = await getVaultFile(def.subproject.state);\n        const fm = parseFrontmatter(txt);\n        s.focus    = fm['proj-fokus']   || '—';\n        s.next     = fm['proj-næste']   || fm['proj-naeste'] || '—';\n        s.blockers = fm['proj-blokker'] || '—';\n      } catch {}\n      s.session = await resolveSession(def.subproject);\n      out.sub = s;\n    }\n\n    if (def.repo) {\n      out.issues = await getIssues(def.repo);\n      out.issueCount = await getOpenCount(def.repo);\n      if (out.issueCount == null && out.issues) out.issueCount = out.issues.length;\n      out.commit = await getLatestCommit(def.repo);\n    }\n\n    return out;\n  }\n\n  async function loadGlobalHeader() {\n    try {\n      const s = await getVaultFile(GLOBAL_STATE);\n      $('#global-state').textContent = firstLine(s) || '—';\n    } catch { $('#global-state').textContent = '—'; }\n    try {\n      const n = await getVaultFile(GLOBAL_NEXT);\n      $('#global-next').textContent = firstLine(n) || '—';\n    } catch { $('#global-next').textContent = '—'; }\n  }\n\n  function setStatus(online) {\n    const s = $('#status');\n    s.className = 'status-dot ' + (online ? 'on' : 'off');\n    $('#status-txt').textContent = online ? 'online' : 'offline';\n  }\n\n  // ---------- load all ----------\n  async function loadAll() {\n    if (!obsKey) { showSetup(true); return; }\n    reachedObs = false;\n    $('#grid').classList.add('loading');\n    renderSkeletons();\n\n    await loadGlobalHeader();\n\n    for (const def of PROJECTS) {\n      try {\n        data[def.id] = await loadProject(def);\n      } catch {\n        data[def.id] = { id: def.id, name: def.name, ext: def.ext, repo: def.repo,\n          focus: '—', next: '—', blockers: '—', date: '—', session: '—',\n          issues: null, issueCount: null, commit: null };\n      }\n      // progressive render\n      if (location.hash.slice(1) === '' ) renderGrid();\n    }\n\n    setStatus(reachedObs);\n    $('#grid').classList.remove('loading');\n    route();\n  }\n\n  // ---------- render: overview ----------\n  function renderSkeletons() {\n    const grid = $('#grid');\n    grid.innerHTML = '';\n    PROJECTS.forEach((def, idx) => {\n      const c = el('div', 'card');\n      c.style.animationDelay = (idx * 28) + 'ms';\n      c.innerHTML =\n        '<div class=\"card-head\"><span class=\"card-name\">' + esc(def.name) +\n          '<span class=\"ext\">' + esc(def.ext) + '<\u002Fspan><\u002Fspan>' +\n          '<span class=\"card-date skel\">···<\u002Fspan><\u002Fdiv>' +\n        '<div class=\"rows\">' +\n          '<div class=\"row\"><span class=\"k\">Fokus<\u002Fspan><span class=\"v skel\">···<\u002Fspan><\u002Fdiv>' +\n          '<div class=\"row\"><span class=\"k\">Næste<\u002Fspan><span class=\"v skel\">···<\u002Fspan><\u002Fdiv>' +\n          '<div class=\"row\"><span class=\"k\">Blokker<\u002Fspan><span class=\"v skel\">···<\u002Fspan><\u002Fdiv>' +\n        '<\u002Fdiv>';\n      grid.appendChild(c);\n    });\n  }\n\n  function renderGrid() {\n    const grid = $('#grid');\n    grid.innerHTML = '';\n    PROJECTS.forEach((def, idx) => {\n      const d = data[def.id];\n      const card = el('button', 'card');\n      card.type = 'button';\n      card.style.animationDelay = (idx * 26) + 'ms';\n      card.addEventListener('click', () => { location.hash = def.id; });\n\n      // head\n      const head = el('div', 'card-head');\n      const nameLink = el('a', 'card-name');\n      nameLink.innerHTML = esc(def.name) + '<span class=\"ext\">' + esc(def.ext) + '<\u002Fspan>';\n      if (def.state) {\n        nameLink.href = obsidianURI(def.state);\n        nameLink.title = 'Åbn i Obsidian';\n        nameLink.addEventListener('click', (e) => { e.stopPropagation(); });\n      } else {\n        nameLink.style.cursor = 'pointer';\n      }\n      head.appendChild(nameLink);\n      if (d && d.date && d.date !== '—') head.appendChild(el('span', 'card-date', d.date));\n      card.appendChild(head);\n\n      // rows\n      const rows = el('div', 'rows');\n      const noState = !def.state;\n      rows.appendChild(makeRow('Fokus', d ? d.focus : '—', noState));\n      rows.appendChild(makeRow('Næste', d ? d.next : '—', noState));\n      rows.appendChild(makeRow('Blokker', d ? d.blockers : '—', noState));\n      if (def.state) {\n        const sr = makeRow('Session', d ? d.session : '—', false);\n        sr.classList.add('dim');\n        rows.appendChild(sr);\n      }\n      card.appendChild(rows);\n\n      // foot\n      const foot = el('div', 'card-foot');\n      if (def.repo) {\n        const n = d && d.issueCount != null ? d.issueCount : '—';\n        const badge = el('span', 'badge' + (n === 0 ? ' zero' : ''));\n        badge.innerHTML = 'Issues <span class=\"n\">' + esc(n) + '<\u002Fspan>';\n        foot.appendChild(badge);\n        const tag = el('span', 'repo-tag' + (def.repoPublic ? ' pub' : ''),\n          def.repoPublic ? 'public' : 'private');\n        foot.appendChild(tag);\n      } else {\n        foot.appendChild(el('span', 'badge zero', 'kun vault'));\n      }\n      card.appendChild(foot);\n\n      grid.appendChild(card);\n    });\n  }\n\n  function makeRow(k, v, muted) {\n    const row = el('div', 'row' + (muted ? ' muted' : ''));\n    row.appendChild(el('span', 'k', k));\n    row.appendChild(el('span', 'v', v == null ? '—' : v));\n    return row;\n  }\n\n  // ---------- render: detail ----------\n  function renderDetail(id) {\n    const def = PROJECTS.find(p => p.id === id);\n    const d = data[id];\n    if (!def) { location.hash = ''; return; }\n\n    const nameEl = $('#detail-name');\n    nameEl.innerHTML = esc(def.name) + '<span class=\"ext\">' + esc(def.ext) + '<\u002Fspan>';\n    if (def.state) { nameEl.href = obsidianURI(def.state); }\n    else { nameEl.removeAttribute('href'); }\n\n    $('#detail-status').textContent = def.repo\n      ? (def.repoPublic ? 'public repo' : 'private repo')\n      : 'kun vault';\n\n    $('#detail-repo').textContent = def.repo ? def.repo : '98_Meta · ingen repo';\n    const obsBtn = $('#detail-obsidian');\n    if (def.state) {\n      obsBtn.style.display = '';\n      obsBtn.onclick = () => { window.location.href = obsidianURI(def.state); };\n    } else {\n      obsBtn.style.display = 'none';\n    }\n\n    const body = $('#detail-body');\n    body.innerHTML = '';\n\n    // ----- left: vault -----\n    const left = el('div');\n    if (def.state) {\n      const t = el('div', 'section-title');\n      t.appendChild(el('span', null, 'Vault'));\n      t.appendChild(el('span', 'sub', def.state.replace(/\\/state\\.md$/, '')));\n      left.appendChild(t);\n      left.appendChild(dfield('Fokus', d ? d.focus : '—'));\n      left.appendChild(dfield('Næste', d ? d.next : '—'));\n      left.appendChild(dfield('Blokker', d ? d.blockers : '—'));\n      left.appendChild(dfield('Seneste session', d ? d.session : '—', true));\n\n      // fable5 subproject\n      if (d && d.sub) {\n        const sb = el('div', 'sub-block');\n        const sn = el('div', 'sub-name');\n        sn.appendChild(el('span', null, d.sub.name));\n        sn.appendChild(el('span', 'tag', 'underprojekt'));\n        sb.appendChild(sn);\n        sb.appendChild(dfield('Fokus', d.sub.focus));\n        sb.appendChild(dfield('Næste', d.sub.next));\n        if (d.sub.blockers && d.sub.blockers !== '—') sb.appendChild(dfield('Blokker', d.sub.blockers));\n        sb.appendChild(dfield('Session', d.sub.session, true));\n        // remove bottom margin of last dfield inside block\n        const last = sb.querySelector('.dfield:last-child');\n        if (last) last.style.marginBottom = '0';\n        left.appendChild(sb);\n      }\n    } else {\n      const t = el('div', 'section-title');\n      t.appendChild(el('span', null, 'Vault'));\n      left.appendChild(t);\n      left.appendChild(emptyNote('Ingen state.md — kun GitHub-data'));\n    }\n    body.appendChild(left);\n\n    // ----- right: github -----\n    const right = el('div');\n    const gt = el('div', 'section-title');\n    gt.appendChild(el('span', null, 'GitHub'));\n    if (def.repo && d && d.issueCount != null) gt.appendChild(el('span', 'sub', d.issueCount + ' åbne'));\n    right.appendChild(gt);\n\n    if (!def.repo) {\n      right.appendChild(emptyNote('Intet repo'));\n    } else if (!ghToken) {\n      right.appendChild(emptyNote('Tilføj GitHub PAT for issues & commits'));\n    } else {\n      const issues = d ? d.issues : null;\n      if (issues && issues.length) {\n        issues.forEach(iss => {\n          const a = el('a', 'issue');\n          a.href = iss.url; a.target = '_blank'; a.rel = 'noopener';\n          a.appendChild(el('div', 'it', iss.title));\n          const m = el('div', 'im');\n          m.appendChild(el('span', 'num', '#' + iss.number));\n          if (iss.updated) m.appendChild(el('span', null, relTime(iss.updated)));\n          a.appendChild(m);\n          right.appendChild(a);\n        });\n      } else if (issues && issues.length === 0) {\n        right.appendChild(emptyNote('Ingen åbne issues'));\n      } else {\n        right.appendChild(emptyNote('Kunne ikke hente issues'));\n      }\n\n      // latest commit\n      if (d && d.commit) {\n        const cm = el('div', 'commit');\n        cm.appendChild(el('div', 'ck', 'Seneste commit'));\n        const a = el('a', null);\n        a.href = d.commit.url; a.target = '_blank'; a.rel = 'noopener';\n        a.style.display = 'block';\n        a.appendChild(el('div', 'cmsg', d.commit.message));\n        const meta = el('div', 'cmeta',\n          (d.commit.author ? d.commit.author + ' · ' : '') + relTime(d.commit.date));\n        a.appendChild(meta);\n        cm.appendChild(a);\n        right.appendChild(cm);\n      }\n    }\n    body.appendChild(right);\n  }\n\n  function dfield(k, v, dim) {\n    const f = el('div', 'dfield');\n    f.appendChild(el('div', 'dk', k));\n    f.appendChild(el('div', 'dv' + (dim ? ' dim' : ''), v == null ? '—' : v));\n    return f;\n  }\n  function emptyNote(txt) { return el('div', 'empty', txt); }\n\n  // ---------- routing ----------\n  function route() {\n    const id = location.hash.slice(1);\n    if (id && PROJECTS.some(p => p.id === id)) {\n      $('#overview').classList.add('hidden');\n      $('#detail').classList.remove('hidden');\n      renderDetail(id);\n      window.scrollTo(0, 0);\n    } else {\n      $('#detail').classList.add('hidden');\n      $('#overview').classList.remove('hidden');\n      renderGrid();\n    }\n  }\n\n  // ---------- setup ----------\n  function showSetup(force) {\n    const s = $('#setup');\n    s.classList.remove('hidden');\n    $('#in-obsidian').value = obsKey;\n    $('#in-github').value = ghToken;\n    $('#in-obsidian').focus();\n    if (!force) s.scrollIntoView ? null : null;\n  }\n  function hideSetup() { $('#setup').classList.add('hidden'); }\n\n  // ---------- events ----------\n  $('#settings-btn').addEventListener('click', () => {\n    const s = $('#setup');\n    if (s.classList.contains('hidden')) showSetup(true); else hideSetup();\n  });\n  $('#refresh-btn').addEventListener('click', () => { data = {}; loadAll(); });\n  $('#save-keys').addEventListener('click', () => {\n    obsKey = $('#in-obsidian').value.trim();\n    ghToken = $('#in-github').value.trim();\n    if (obsKey) localStorage.setItem(LS_OBS, obsKey); else localStorage.removeItem(LS_OBS);\n    if (ghToken) localStorage.setItem(LS_GH, ghToken); else localStorage.removeItem(LS_GH);\n    hideSetup();\n    data = {};\n    loadAll();\n  });\n  $('#cancel-keys').addEventListener('click', hideSetup);\n  $('#clear-keys').addEventListener('click', () => {\n    localStorage.removeItem(LS_OBS);\n    localStorage.removeItem(LS_GH);\n    obsKey = ''; ghToken = ''; data = {};\n    $('#global-state').textContent = '—';\n    $('#global-next').textContent = '—';\n    showSetup(true);\n    renderSkeletons();\n  });\n  $('#back-btn').addEventListener('click', () => { location.hash = ''; });\n  document.querySelectorAll('#in-obsidian, #in-github').forEach(inp => {\n    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#save-keys').click(); });\n  });\n  window.addEventListener('hashchange', route);\n\n  // ---------- boot ----------\n  renderSkeletons();\n  if (obsKey) loadAll(); else { showSetup(true); setStatus(true); }\n\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
