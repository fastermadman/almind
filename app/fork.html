<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fork et forløb · Almind</title>
  <meta name="description" content="Videresender til editoren for at forke et eksisterende Almind-forløb.">
  <!-- Fork-oplevelsen bor i blok-editoren. Denne side består kun for at
       eksisterende links (sequence, graph, browse) bliver ved med at virke. -->
  <script>
    const p = new URLSearchParams(location.search);
    const id = p.get("id") || "dss-v1";
    const dim = p.get("dimension");
    location.replace(`rediger.html?fork=${encodeURIComponent(id)}${dim ? `&dimension=${encodeURIComponent(dim)}` : ""}`);
  </script>
</head>
<body>
  <p>Åbner editoren ... <a href="rediger.html">Fortsæt manuelt</a></p>
</body>
</html>
