<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview · Almind</title>
  <meta name="description" content="Forhåndsvis et forløb, som det ser ud for andre, før du deler eller publicerer det.">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/almind.css">
</head>
<body>
<header class="site-header site-header-full"></header>
<div class="container" id="side">

  <p class="intro" id="kladde-note" hidden style="font-family:var(--font-ui); background:var(--surface); border:1px solid var(--border); border-left:4px solid var(--fagfarve, var(--ink)); border-radius:12px; padding:0.8rem 1.1rem; margin-top:1rem;">
    Dit forløb. Sådan ser det ud når det deles. Intet er sendt nogen steder hen: dette er en lokal demo.
    <a href="rediger.html?kladde=1">&larr; Tilbage til editoren</a>
  </p>

  <div class="preview-vaerktoejer">
    <div class="faner" role="tablist" aria-label="Dokumenttype">
      <button class="fane" role="tab" id="fane-laerer" aria-selected="true">Lærervejledning</button>
      <button class="fane" role="tab" id="fane-elev" aria-selected="false">Elevmateriale</button>
    </div>
    <span class="mellemrum"></span>
    <button class="knap sekundaer" id="print-knap">Print</button>
  </div>

  <div id="dokument-rod"></div>

  <footer class="site-footer">
    <span>Almind · non-profit, fællesejet infrastruktur for læremidler</span>
    <span>Alt indhold: CC BY-SA 4.0 · <a href="graph.html">Konstellation</a> · <a href="bidrag.html">Bidrag &amp; tak</a></span>
  </footer>
</div>

<script type="module">
  import { sitehoved } from "./assets/js/sitehoved.js";
  import { hentForloeb, findForloeb, hentKladde, familieFor } from "./assets/js/data.js";
  import { renderDokument } from "./assets/js/dokument.js";

  sitehoved(document.querySelector(".site-header"));

  const params = new URLSearchParams(location.search);
  let forloeb;
  if (params.get("kladde") === "1") {
    forloeb = hentKladde();
    if (forloeb) document.getElementById("kladde-note").hidden = false;
  }
  if (!forloeb) {
    const alle = await hentForloeb();
    forloeb = findForloeb(alle, params.get("id")) || findForloeb(alle, "dss-v1");
  }

  document.title = `Preview: ${forloeb.titel} · Almind`;
  const side = document.getElementById("side");
  const egetFag = familieFor(forloeb.fag);
  side.dataset.fag = egetFag;

  // P1: tilstand læses fra URL'en ved load, så et delt link
  // (?tilstand=elev) åbner direkte på elevmaterialet.
  let tilstand = params.get("tilstand") === "elev" ? "elev" : "laerer";
  const rod = document.getElementById("dokument-rod");

  async function tegn() {
    rod.innerHTML = "";
    const ark = await renderDokument(forloeb, tilstand);
    ark.dataset.fag = egetFag;
    rod.appendChild(ark);
  }

  const fLaerer = document.getElementById("fane-laerer");
  const fElev = document.getElementById("fane-elev");
  function vaelgFane(ny) {
    tilstand = ny;
    fLaerer.setAttribute("aria-selected", String(ny === "laerer"));
    fElev.setAttribute("aria-selected", String(ny === "elev"));
    params.set("tilstand", ny);
    history.replaceState(null, "", `${location.pathname}?${params}`);
    tegn();
  }
  vaelgFane(tilstand);
  fLaerer.addEventListener("click", () => vaelgFane("laerer"));
  fElev.addEventListener("click", () => vaelgFane("elev"));
  document.getElementById("print-knap").addEventListener("click", () => {
    const q = params.get("kladde") === "1" ? "kladde=1" : `id=${forloeb.id}`;
    location.href = `print.html?${q}&tilstand=${tilstand}`;
  });
</script>
</body>
</html>
