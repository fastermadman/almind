<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Byg dit forløb · Almind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Jost:wght@400;500;600&family=Atkinson+Hyperlegible+Next:ital,wght@0,400;0,700;1,400&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Noto+Serif:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/almind.css">
  <link rel="stylesheet" href="assets/css/rediger.css">
  <script src="assets/vendor/sortable.min.js"></script>
</head>
<body>
<div class="container" id="side">

  <header class="site-header"></header>

  <div class="editor-hoved">
    <div>
      <h1 id="editor-titel">Byg dit forløb</h1>
      <p class="intro">
        Forløbet bygges af blokke: faser, aktiviteter, callouts og åbne pladser.
        Træk i <span aria-hidden="true">⠿</span> for at flytte rundt. Alt gemmes løbende som kladde i din browser.
      </p>
    </div>
    <div class="editor-knapper">
      <button class="knap sekundaer" id="download-knap" title="Forløbet som JSON-fil — den form det deles og forkes i">Download JSON</button>
      <button class="knap sekundaer" id="print-knap">Print</button>
      <button class="knap sekundaer" id="elev-knap" title="Sådan ser eleverne forløbet — kun elevtekst og elev-markerede materialer">Se som elev</button>
      <button class="knap" id="dokument-knap">Se som dokument</button>
      <button class="knap" id="klasse-knap" hidden title="Publicér til en gren i din egen fork og få et elev-link til klassen — ingen pull request">Del med klassen</button>
      <button class="knap" id="cb-knap" hidden></button>
    </div>
  </div>

  <div class="arvelinje" id="arvelinje" hidden></div>
  <p class="cb-status" id="cb-status" hidden></p>

  <div class="editor-layout">
    <div id="kanvas"></div>
    <aside id="profil-panel" class="profil-panel" aria-label="Didaktisk profil"></aside>
  </div>

  <footer class="site-footer">
    <span>Almind · non-profit, fællesejet infrastruktur for læremidler</span>
    <span>Alt indhold: CC BY-SA 4.0 · <a href="graph.html">Konstellation</a></span>
  </footer>
</div>

<script type="module">
  // OAuth-loginet kræver 127.0.0.1 (RFC 8252/Forgejo), ikke localhost — se
  // forgejo.js. Skiftet sker HER, på sideindlæsning, før noget andet, så
  // brugeren aldrig oplever at "Log ind med Codeberg" tilsyneladende ikke gør
  // noget ved første klik (det gjorde den ikke tidligere: den skiftede origin
  // stille og krævede et andet klik for selve login'et).
  if (location.hostname === "localhost") {
    location.replace(location.href.replace("//localhost", "//127.0.0.1"));
  }

  import { sitehoved } from "./assets/js/sitehoved.js";
  import { hentForloeb, findForloeb, hentKladde, gemKladde, familieFor, fagNavn } from "./assets/js/data.js";
  import { startEditor, nytForloeb, forkAf, centrumOK, aabnCentrumDialog } from "./assets/js/blokke.js";

  sitehoved(document.querySelector(".site-header"));

  const params = new URLSearchParams(location.search);
  let f = null;

  if (params.get("kladde") === "1") f = hentKladde();
  if (!f && params.get("fork")) {
    const alle = await hentForloeb();
    const original = findForloeb(alle, params.get("fork"));
    if (original) f = forkAf(original);
  }
  if (!f) f = nytForloeb();

  document.getElementById("side").dataset.fag = familieFor(f.fag);
  if (f.fork_af) {
    document.getElementById("editor-titel").textContent = "Fork: byg videre";
    const alle = await hentForloeb();
    const original = findForloeb(alle, f.fork_af.id);
    if (original) {
      const linje = document.getElementById("arvelinje");
      linje.hidden = false;
      linje.innerHTML = `
        <span class="tag">${fagNavn(original.fag)}</span>
        <span>Du bygger videre på <strong></strong></span>
        <span class="metadata">${original.forfatter} · ${original.institution} · ${original.aar} · ${original.licens}</span>
      `;
      linje.querySelector("strong").textContent =
        original.titel + (original.undertitel ? ": " + original.undertitel : "");
    }
  }

  startEditor({
    kanvas: document.getElementById("kanvas"),
    panel: document.getElementById("profil-panel"),
    f,
    fokusDimension: params.get("dimension"),
  });

  const gemOgGaa = (url) => { gemKladde(f); location.href = url; };
  document.getElementById("dokument-knap").addEventListener("click", () => gemOgGaa("preview.html?kladde=1"));
  document.getElementById("print-knap").addEventListener("click", () => gemOgGaa("print.html?kladde=1"));
  document.getElementById("elev-knap").addEventListener("click", () => gemOgGaa("elev.html?kladde=1"));

  // Codeberg: login → del som ægte fork/gren + PR. Download-JSON består som
  // fallback uden login — filen er stadig persistensformen.
  const { erLoggetInd, login, hentBruger, delTilAlmind, gemTilEgenGren } = await import("./assets/js/forgejo.js");
  const cbKnap = document.getElementById("cb-knap");
  const klasseKnap = document.getElementById("klasse-knap");
  const cbStatus = document.getElementById("cb-status");
  const visStatus = (tekst, erFejl = false) => {
    cbStatus.hidden = false;
    cbStatus.classList.toggle("fejl", erFejl);
    cbStatus.textContent = tekst;
  };

  async function tegnCbKnap() {
    cbKnap.hidden = false;
    klasseKnap.hidden = !erLoggetInd(); // #56: kun logget ind — knappen ER en git-operation
    if (erLoggetInd()) {
      cbKnap.textContent = "Del til Almind";
      try {
        visStatus(`Logget ind på Codeberg som ${await hentBruger()} · forslag sendes som pull request`);
      } catch (fejl) {
        visStatus(fejl.message, true);
        if (!erLoggetInd()) cbKnap.textContent = "Log ind med Codeberg"; // 401 → logget ud
      }
    } else {
      cbKnap.textContent = "Log ind med Codeberg";
    }
  }

  cbKnap.addEventListener("click", async () => {
    if (!erLoggetInd()) { login(); return; }
    if (!centrumOK(f)) {
      const fortsat = await aabnCentrumDialog(f, gemKladde);
      if (!fortsat) return;
    }
    gemKladde(f);
    cbKnap.disabled = true;
    visStatus("Deler forløbet: fork/gren → commit → pull request ...");
    try {
      const prUrl = await delTilAlmind(f);
      cbStatus.hidden = false;
      cbStatus.classList.remove("fejl");
      cbStatus.innerHTML = "";
      cbStatus.append("Forslaget er sendt: ");
      const a = document.createElement("a");
      a.href = prUrl; a.target = "_blank"; a.rel = "noopener";
      a.textContent = prUrl;
      cbStatus.appendChild(a);
    } catch (fejl) {
      visStatus("Kunne ikke dele: " + fejl.message, true);
      tegnCbKnap();
    } finally {
      cbKnap.disabled = false;
    }
  });
  tegnCbKnap();

  // #56: "Del med klassen" — commit til egen gren, ingen PR og ingen
  // publish-gate: at dele med egen klasse er ikke et forslag til fællesskabet.
  klasseKnap.addEventListener("click", async () => {
    gemKladde(f);
    klasseKnap.disabled = true;
    visStatus("Deler med klassen: commit til en gren i din egen fork ...");
    try {
      const sti = await gemTilEgenGren(f);
      gemKladde(f); // klasse_gren + forfatter_codeberg blev sat af kaldet
      const url = new URL(sti, location.href).href;
      cbStatus.hidden = false;
      cbStatus.classList.remove("fejl");
      cbStatus.innerHTML = "";
      cbStatus.append("Elev-link til klassen (rettelser opdaterer samme link): ");
      const a = document.createElement("a");
      a.href = url; a.target = "_blank"; a.rel = "noopener";
      a.textContent = url;
      cbStatus.appendChild(a);
      const kopier = document.createElement("button");
      kopier.className = "knap sekundaer";
      kopier.textContent = "Kopiér link";
      kopier.addEventListener("click", () => navigator.clipboard.writeText(url));
      cbStatus.append(" ");
      cbStatus.appendChild(kopier);
    } catch (fejl) {
      visStatus("Kunne ikke dele med klassen: " + fejl.message, true);
    } finally {
      klasseKnap.disabled = false;
    }
  });

  // Filen ER persistensformen: ét forløb = én JSON = ét fremtidigt Codeberg-repo
  document.getElementById("download-knap").addEventListener("click", () => {
    gemKladde(f);
    const navn = (f.titel || "forloeb").toLowerCase()
      .replace(/[æå]/g, "a").replace(/ø/g, "o")
      .replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "forloeb";
    const blob = new Blob([JSON.stringify(f, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${navn}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  });
</script>
</body>
</html>
